# Build CI base images and push to ghcr.io/pkuppens/pkuppens/
# Images: ci-base-3.12, ci-hf-base-3.12, ci-whisper-3.12
# All assets in ci-base-images/ directory.
# Prerequisite: ghcr.io access (GITHUB_TOKEN has packages: write).
# Prerequisite: HF_TOKEN secret for ci-hf-base model download (read token).
name: Build CI Base Images

on:
  schedule:
    # Every Saturday 00:00 UTC; should-run gate keeps first Saturday of month only.
    - cron: "0 0 * * 6"
  push:
    branches: [main]
    paths:
      - "ci-base-images/**"
      - ".github/workflows/build-ci-base-images.yml"
  workflow_dispatch: {}

concurrency:
  group: build-ci-base-images
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check schedule gate
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%d)" -le 7 ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: should-run
    if: needs.should-run.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ci-base-3.12
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci-base-images/Dockerfile.ci-base-3.12
          push: true
          tags: ghcr.io/pkuppens/pkuppens/ci-base-3.12:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ci-hf-base-3.12
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci-base-images/Dockerfile.ci-hf-base-3.12
          push: true
          tags: ghcr.io/pkuppens/pkuppens/ci-hf-base-3.12:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}

      - name: Build and push ci-whisper-3.12
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci-base-images/Dockerfile.ci-whisper-3.12
          push: true
          tags: ghcr.io/pkuppens/pkuppens/ci-whisper-3.12:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
