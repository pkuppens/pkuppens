# Lint all Markdown files with markdownlint-cli2.
# Runs on PRs and pushes to main that touch .md files.
# Fails the job on any reported violation (same rules as local pre-commit).
name: Lint Markdown

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/lint-markdown.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/lint-markdown.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: lint-markdown-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
